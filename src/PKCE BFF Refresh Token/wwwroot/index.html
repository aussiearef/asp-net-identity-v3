<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Weather Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h2>Weather Forecast</h2>

<button id="loadBtn">Load Weather</button>

<table class="table table-striped table-bordered" id="weatherTable">
    <thead>
    <tr>
        <th>Date</th>
        <th>Temp (C)</th>
        <th>Summary</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

    document.getElementById("loadBtn").onclick = async function () {

        // http cookie instead of a bearer token
        const res = await fetch("/weatherforecast", {
            headers: {
                'X-CSRF': '1'
            }
        });
        if (res.status === 401)
            window.location.href = "/bff/login";

        const data = await res.json();
        const tbody = document.querySelector("#weatherTable tbody");
        tbody.innerHTML = "";

        data.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>${item.date}</td>
            <td>${item.temperatureC}</td>
            <td>${item.summary}</td>
        `;
            tbody.appendChild(tr);
        });

        document.getElementById("weatherTable").style.display = "table";
    }
</script>

</body>
</html>
