<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Weather Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h2>Weather Forecast</h2>

<div class="col-12">
    <label>Profile Id</label>
    <label>
        <input id="profileId" type="number" value="100"/>
    </label>
</div>
<button id="loadBtn">View My Profile</button>

<div class="col-2 alert alert-primary" id="divResult"></div>

<script>

    document.getElementById("loadBtn").onclick = async function () {

        const profileId = document.getElementById("profileId").value;
        // http cookie instead of a bearer token
        const res = await fetch("/profile?profileId=" + profileId, {
            redirect: 'manual'
        });

        if (res.status === 0)
            window.location.href = "/login";

        const data = await res.text();
        const divResult = document.querySelector("#divResult");
        divResult.innerHTML = data;

    }
</script>

</body>
</html>
